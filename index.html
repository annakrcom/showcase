  <script>
    // Detect browser language and redirect to matching locale
    (function () {
      var supported = ['en', 'de', 'fr', 'it'];
      var lang = (navigator.language || 'en').slice(0, 2).toLowerCase();
      var target = supported.indexOf(lang) !== -1 ? lang : 'en';
      window.location.replace('./' + target + '/index.html');
    })();
  </script>
